/**:
  ros__parameters:
    bt_loop_duration: 100
    always_reload_bt_xml: true
    plugin_lib_names:
      # epsilon_crane_behavior_tree
      - BT_set_goal_pose_bt_node
      - BT_calc_a2b_movement_bt_node
      - BT_calc_grip_movement_bt_node
      - BT_get_user_approval_decorator
      - BT_check_user_approval_condition
      - BT_optimize_target_angle_bt_node
      - BT_wait_goal_pose_decorator
      # lsrl_behavior_tree
      - BT_follow_joint_trajectory_action
      - BT_switch_controller_action
      # concrete_block_behavior_tree
      - BT_cb_get_next_assembly_task_action
      - BT_cb_set_block_task_status_action
    behaviortree: "wall_assembly.xml"
    logging:
      enable_groot_monitoring: true
      enable_file_logging: true
      enable_cout_logging: true

lifecycle_manager:
  ros__parameters:
    autostart: true
    node_names: ["bt_action_server"]
    bond_timeout: 4.0
    attempt_respawn_reconnection: true
    bond_respawn_max_duration: 10.0
