/**:
  ros__parameters:
    bt_loop_duration: 100
    always_reload_bt_xml: true
    # Smoke-only tree; keep the plugin set empty so this profile stays minimal.
    plugin_lib_names: []
    behaviortree: "dummy_start.xml"
    logging:
      enable_groot_monitoring: false
      enable_file_logging: false
      enable_cout_logging: true

lifecycle_manager:
  ros__parameters:
    autostart: true
    node_names: ["bt_action_server"]
    bond_timeout: 4.0
    attempt_respawn_reconnection: true
    bond_respawn_max_duration: 10.0
